<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي اليوم - أ/ عبدالعزيز الفيفي 🏆</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 20px; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #2c3e50;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }
        .date-box {
            background: #fff9f0;
            border: 2px solid #e67e22;
            border-radius: 12px;
            padding: 15px;
            margin: 20px 0;
            color: #d35400;
            font-weight: bold;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .loader { 
            border: 5px solid #f3f3f3; 
            border-top: 5px solid #e67e22; 
            border-radius: 50%; 
            width: 45px; 
            height: 45px; 
            animation: spin 1s linear infinite; 
            margin: 20px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { color: #2c3e50; margin: 0; font-size: 1.6rem; }
        .footer { margin-top: 20px; font-weight: bold; color: #2c3e50; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🏆 تحدي اليوم المتجدد 🏆</h2>
        
        <div id="fullDate" class="date-box">جاري ضبط التاريخ...</div>
        
        <div class="loader"></div>
        <p id="statusMsg" style="color: #7f8c8d;">أهلاً بك يا بطل.. جاري تحويلك للاختبار</p>
        
        <div class="footer">
            ✨ أ / عبدالعزيز الفيفي<br>
            ثانوية الأمير عبدالمجيد 🎓
        </div>
    </div>

    <script>
        function displayDate() {
            const now = new Date();
            
            // 1. الحصول على اليوم (الثلاثاء)
            const dayName = now.toLocaleDateString('ar-SA', { weekday: 'long' });
            
            // 2. الحصول على التاريخ الهجري (١٢ شوال ١٤٤٧ هـ)
            const hijriDate = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-uma', {
                day: 'numeric', month: 'long', year: 'numeric'
            }).format(now);

            // 3. الحصول على التاريخ الميلادي (٣١ مارس ٢٠٢٦ م)
            const gregDate = new Intl.DateTimeFormat('ar-SA', {
                day: 'numeric', month: 'long', year: 'numeric'
            }).format(now);

            // دمج الجميع في التنسيق المطلوب
            const finalFormat = dayName + "، " + hijriDate + " هـ | " + gregDate + " م";
            document.getElementById('fullDate').innerText = finalFormat;
        }

        // خريطة الروابط المتزامنة
        const dailyLinks = {
            2: "https://aztlaztl1512-bit.github.io/Zzz-7/", // الثلاثاء
            3: "https://aztlaztl1512-bit.github.io/Zzz-1/", // الأربعاء
            4: "https://aztlaztl1512-bit.github.io/Zzz-2/", // الخميس
            5: "https://aztlaztl1512-bit.github.io/Zzz-3/", // الجمعة
            6: "https://aztlaztl1512-bit.github.io/Zzz-4/", // السبت
            0: "https://aztlaztl1512-bit.github.io/Zzz-5/", // الأحد
            1: "https://aztlaztl1512-bit.github.io/Zzz-6/"  // الإثنين
        };

        function startRedirect() {
            displayDate();
            const now = new Date();
            const dayNum = now.getDay();
            const targetLink = dailyLinks[dayNum];

            setTimeout(() => {
                window.location.href = targetLink;
            }, 3000); // 3 ثوانٍ ليعيش الطالب تجربة التحدي ويقرأ التاريخ
        }

        window.onload = startRedirect;
    </script>
</body>
</html>
