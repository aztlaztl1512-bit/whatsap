<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي اليوم - أ/ عبدالعزيز الفيفي 🏆</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 20px; 
            background: #ffffff;
            color: #2c3e50;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 90%;
        }
        .title {
            color: #4b0082; /* اللون البنفسجي */
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .date-box {
            color: #e64a19; /* اللون البرتقالي */
            font-size: 1.4rem;
            font-weight: bold;
            margin: 15px 0;
        }
        .loader { 
            border: 4px solid #f3f3f3; 
            border-top: 4px solid #4b0082; 
            border-radius: 50%; 
            width: 35px; 
            height: 35px; 
            animation: spin 1s linear infinite; 
            margin: 20px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .footer { 
            margin-top: 30px; 
            font-weight: bold; 
            color: #7f8c8d; 
            border-top: 1px solid #eee; 
            padding-top: 15px; 
            font-size: 0.9rem; 
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="title">( تحدي اليوم )</div>
        
        <!-- صندوق التاريخ الميلادي فقط -->
        <div id="fullDate" class="date-box">جاري تحديد التاريخ...</div>
        
        <p style="color: #7f8c8d; font-size: 1rem;">أهلاً بك يا بطل.. جاري تحويلك للاختبار 🔥</p>
        
        <div class="loader"></div>
        
        <div class="footer">
            ✨ أ / عبدالعزيز الفيفي - ثانوية الأمير عبدالمجيد 🎓
        </div>
    </div>

    <script>
        function displayDate() {
            const now = new Date();
            
            // إعداد التاريخ الميلادي فقط بتنسيق: الثلاثاء، ٣١ مارس ٢٠٢٦
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const gregDate = now.toLocaleDateString('ar-SA', options);

            document.getElementById('fullDate').innerHTML = gregDate;
        }

        const dailyLinks = {
            2: "https://aztlaztl1512-bit.github.io/Zzz-7/", // الثلاثاء
            3: "https://aztlaztl1512-bit.github.io/Zzz-1/", // الأربعاء
            4: "https://aztlaztl1512-bit.github.io/Zzz-2/", // الخميس
            5: "https://aztlaztl1512-bit.github.io/Zzz-3/", // الجمعة
            6: "https://aztlaztl1512-bit.github.io/Zzz-4/", // السبت
            0: "https://aztlaztl1512-bit.github.io/Zzz-5/", // الأحد
            1: "https://aztlaztl1512-bit.github.io/Zzz-6/"  // الإثنين
        };

        function startRedirect() {
            displayDate();
            const now = new Date();
            const dayNum = now.getDay();
            const targetLink = dailyLinks[dayNum];

            setTimeout(() => {
                window.location.href = targetLink;
            }, 2000); 
        }

        window.onload = startRedirect;
    </script>
</body>
</html>
