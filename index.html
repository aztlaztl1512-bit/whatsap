<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي اليوم - أ/ عبدالعزيز الفيفي 🏆</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 100px 20px; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #2c3e50;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        .loader { 
            border: 5px solid #f3f3f3; 
            border-top: 5px solid #3498db; 
            border-radius: 50%; 
            width: 50px; 
            height: 50px; 
            animation: spin 1s linear infinite; 
            margin: 20px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { color: #2980b9; margin-bottom: 10px; }
        p { font-size: 1.1rem; color: #7f8c8d; }
        .footer { margin-top: 20px; font-weight: bold; color: #2c3e50; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🏆 تحدي اليوم 🏆</h2>
        <p>جاري المزامنة مع المنصة..</p>
        <div class="loader"></div>
        <p id="statusMsg">لحظات ويفتح التحدي الخاص بك...</p>
        
        <div class="footer">
            ✨ أ / عبدالعزيز الفيفي<br>
            ثانوية الأمير عبدالمجيد 🎓
        </div>
    </div>

    <script>
        // الروابط السبعة مرتبة لتتوافق مع نظام المنصة الخاص بك
        const dailyLinks = {
            2: "https://aztlaztl1512-bit.github.io/Zzz-7/", // الثلاثاء (اليوم)
            3: "https://aztlaztl1512-bit.github.io/Zzz-1/", // الأربعاء (غداً)
            4: "https://aztlaztl1512-bit.github.io/Zzz-2/", // الخميس
            5: "https://aztlaztl1512-bit.github.io/Zzz-3/", // الجمعة
            6: "https://aztlaztl1512-bit.github.io/Zzz-4/", // السبت
            0: "https://aztlaztl1512-bit.github.io/Zzz-5/", // الأحد
            1: "https://aztlaztl1512-bit.github.io/Zzz-6/"  // الإثنين
        };

        function startRedirect() {
            const now = new Date();
            const dayNum = now.getDay(); // 0=الأحد, 1=الإثنين, 2=الثلاثاء...
            
            const targetLink = dailyLinks[dayNum];

            // تحويل فوري مع تأخير بسيط للمؤثرات البصرية
            setTimeout(() => {
                window.location.href = targetLink;
            }, 1200);
        }

        window.onload = startRedirect;
    </script>
</body>
</html>
