<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي اليوم - أ/ عبدالعزيز الفيفي 🏆</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 20px; 
            background: #ffffff;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 95%;
        }
        .title {
            color: #4b0082; /* اللون البنفسجي كما في الصورة */
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .date-row {
            color: #e64a19; /* اللون البرتقالي المائل للأحمر كما في الصورة */
            font-size: 1.3rem;
            font-weight: bold;
            margin: 20px 0;
            direction: rtl;
        }
        .loader { 
            border: 4px solid #f3f3f3; 
            border-top: 4px solid #4b0082; 
            border-radius: 50%; 
            width: 30px; 
            height: 30px; 
            animation: spin 1s linear infinite; 
            margin: 20px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .footer { 
            margin-top: 30px; 
            color: #7f8c8d; 
            font-size: 0.9rem;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="title">( تحدي اليوم )</div>
        
        <!-- هذا السطر هو الذي سيظهر فيه التاريخ كما في الصورة تماماً -->
        <div id="fullDate" class="date-row">جاري التحميل...</div>
        
        <div class="loader"></div>
        
        <div class="footer">
            أ. عبدالعزيز الفيفي - ثانوية الأمير عبدالمجيد 🎓
        </div>
    </div>

    <script>
        function getDates() {
            const now = new Date();

            // 1. اسم اليوم (الثلاثاء)
            const dayName = now.toLocaleDateString('ar-SA', { weekday: 'long' });

            // 2. التاريخ الهجري (بالقوة لضمان الظهور الصحيح)
            const hijriFormatter = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-uma-nu-arab', {
                day: 'numeric', month: 'long', year: 'numeric'
            });
            const hijriDate = hijriFormatter.format(now);

            // 3. التاريخ الميلادي (بالقوة لضمان الظهور الصحيح)
            const gregFormatter = new Intl.DateTimeFormat('ar-SA-u-ca-gregory-nu-arab', {
                day: 'numeric', month: 'long', year: 'numeric'
            });
            const gregDate = gregFormatter.format(now);

            // التنسيق النهائي: الثلاثاء، ١٢ شوال ١٤٤٧ هـ | ٣١ مارس ٢٠٢٦ م
            document.getElementById('fullDate').innerText = `${dayName}، ${hijriDate} | ${gregDate}`;
        }

        function startRedirect() {
            getDates();

            const now = new Date();
            const dayNum = now.getDay(); 

            // روابط المزامنة
            const dailyLinks = {
                2: "https://aztlaztl1512-bit.github.io/Zzz-7/", // الثلاثاء
                3: "https://aztlaztl1512-bit.github.io/Zzz-1/", // الأربعاء
                4: "https://aztlaztl1512-bit.github.io/Zzz-2/", // الخميس
                5: "https://aztlaztl1512-bit.github.io/Zzz-3/", // الجمعة
                6: "https://aztlaztl1512-bit.github.io/Zzz-4/", // السبت
                0: "https://aztlaztl1512-bit.github.io/Zzz-5/", // الأحد
                1: "https://aztlaztl1512-bit.github.io/Zzz-6/"  // الإثنين
            };

            const targetLink = dailyLinks[dayNum];

            setTimeout(() => {
                window.location.href = targetLink;
            }, 2500); 
        }

        window.onload = startRedirect;
    </script>
</body>
</html>
